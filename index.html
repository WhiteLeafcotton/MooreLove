<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css?v=2.0">
    <title>HBCR Senior Living</title>
</head>
<body>
    <header class="top-bar">
        <div class="top-links">
            <a href="#">Download the App</a>
            <a href="#">Sign In</a>
            <a href="#">English</a>
        </div>
    </header>

    <section class="hero" id="hero">
        <video id="heroVideo" autoplay loop muted playsinline>
            <source src="home-video.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-logo">HBCR</div>
            <h1>WHERE CARE MEETS <span>UNPARALLELED</span> ELEGANCE</h1>
            <a href="#" class="hero-button">Discover Our Story</a>
        </div>
        <div class="icon-bar-container">
            <div class="icon-bar-line"></div>
            <div class="icon-wrapper">
                <div class="icon-item"><i class="fa-solid fa-building"></i><span>Residences</span></div>
                <div class="icon-item"><i class="fa-solid fa-house-chimney"></i><span>Villas</span></div>
                <div class="icon-item"><i class="fa-solid fa-utensils"></i><span>Dining</span></div>
                <div class="icon-item"><i class="fa-solid fa-sailboat"></i><span>Yachts</span></div>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="container-wide">
            <div class="minimal-card-bg">
                <img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb" class="bg-img">
                <div class="card-overlay"></div>
                <div class="card-content-overlay">
                    <span class="card-subtitle">Explore our Resorts</span>
                    <h3 class="card-title">EXPERIENCES TO REMEMBER</h3>
                    <p>Uncover Asia’s most sought-after destinations.</p>
                    <a href="#" class="card-button">Book Now</a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
