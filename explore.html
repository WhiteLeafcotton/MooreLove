
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Open Graph Meta Tags for Social Sharing -->
    <meta property="og:title" content="Brownie | Application" />
    <meta property="og:description" content="Complete your Brownie application online. Quick and simple registration form." />
    <meta property="og:image" content="https://github.com/WhiteLeafcotton/MooreLove/blob/main/tag.jpg?raw=true" />
    <meta property="og:url" content="https://whiteleafcotton.github.io/MooreLove/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>Moore Love and Care | Resident Application</title>

    <!-- Google Fonts for Brand & Luxury Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=WindSong:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Pure white full-screen background */
        body {
            background-color: #ffffff;
            color: #333333;
            padding: 80px 40px;
            min-height: 100vh;
            position: relative;
        }

        /* Top Left Minimal Back Button */
        .back-btn {
            position: absolute;
            top: 25px;
            left: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #333333;
            text-decoration: none;
            transition: transform 0.4s ease, opacity 0.4s ease;
            animation: prestigiousReveal 2.2s cubic-bezier(0.075, 0.82, 0.165, 1) forwards;
        }

        .back-btn:hover {
            transform: translateX(-4px);
            opacity: 0.6;
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
        }

        /* Bottom Right Share Button */
        .share-btn {
            position: fixed;
            bottom: 25px;
            right: 30px;
            background: none;
            border: none;
            cursor: pointer;
            color: #333333;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: transform 0.4s ease, opacity 0.4s ease;
            z-index: 10;
            animation: prestigiousReveal 2.2s cubic-bezier(0.075, 0.82, 0.165, 1) forwards;
            animation-delay: 2.2s;
            opacity: 0;
        }

        .share-btn:hover {
            transform: scale(1.03);
            opacity: 0.7;
        }

        .share-btn svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Main Form Container */
        .form-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* BRAND LOGO HEADER (MOORE love and care) - Pure Slow Opacity Fade */
        .brand-header-logo {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 35px;
            animation: logoPureFade 3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 0.1s;
            opacity: 0;
        }

        .brand-header-logo .strong-title {
            font-family: 'Montserrat', sans-serif !important;
            font-weight: 300 !important;
            font-size: 48px !important;
            letter-spacing: 10px !important;
            text-transform: uppercase;
            color: #111111;
            line-height: 0.85;
            margin: 0;
        }

        .brand-header-logo .hero-logo-icon {
            width: 40px !important;
            height: 40px !important;
            opacity: 0.9;
            flex-shrink: 0;
        }

        .brand-header-logo .script-subtitle {
            font-family: 'WindSong', cursive !important;
            font-size: 36px !important;
            font-weight: 400;
            color: #111111 !important;
            position: absolute;
            bottom: -28px !important;
            left: 15% !important;
            z-index: 2;
            text-transform: lowercase;
            white-space: nowrap;
            pointer-events: none;
        }

        /* Subtext */
        p.subtext {
            color: #666666;
            font-size: 1rem;
            margin-bottom: 50px;
            animation: prestigiousReveal 2.2s cubic-bezier(0.075, 0.82, 0.165, 1) forwards;
            animation-delay: 0.4s;
            opacity: 0;
        }

        /* Side-by-Side Layout for Text Fields */
        .form-group-inline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 35px;
            gap: 20px;
            animation: prestigiousReveal 2.2s cubic-bezier(0.075, 0.82, 0.165, 1) forwards;
            opacity: 0;
        }

        /* Extended Staggered Sequence */
        .form-group-inline:nth-of-type(1) { animation-delay: 0.6s; }
        .form-group-inline:nth-of-type(2) { animation-delay: 0.8s; }

        /* Checkbox Section Text Reveals */
        .checkbox-section > label {
            display: block;
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 15px;
            animation: prestigiousReveal 2.2s cubic-bezier(0.075, 0.82, 0.165, 1) forwards;
            animation-delay: 1.0s;
            opacity: 0;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            cursor: pointer;
            animation: prestigiousReveal 2.2s cubic-bezier(0.075, 0.82, 0.165, 1) forwards;
            opacity: 0;
        }

        /* Stagger individual checkbox items */
        .checkbox-item:nth-child(1) { animation-delay: 1.15s; }
        .checkbox-item:nth-child(2) { animation-delay: 1.30s; }
        .checkbox-item:nth-child(3) { animation-delay: 1.45s; }

        .form-group-inline.align-top { animation-delay: 1.65s; }
        button[type="submit"] { animation-delay: 1.85s; }

        .form-group-inline label {
            font-weight: 600;
            font-size: 1.05rem;
            color: #333333;
            min-width: 220px;
            flex-shrink: 0;
        }

        .form-group-inline input[type="text"],
        .form-group-inline input[type="email"],
        .form-group-inline textarea {
            flex-grow: 1;
            border: none;
            border-bottom: 2px solid #ccc;
            border-radius: 0;
            padding: 8px 4px;
            font-size: 1rem;
            background: transparent;
            outline: none;
            transition: border-color 0.4s ease;
        }

        .form-group-inline input[type="text"]:focus,
        .form-group-inline input[type="email"]:focus,
        .form-group-inline textarea:focus {
            border-bottom-color: #111111;
        }

        .form-group-inline.align-top {
            align-items: flex-start;
        }

        .form-group-inline.align-top label {
            padding-top: 8px;
        }

        .form-group-inline textarea {
            resize: vertical;
            min-height: 40px;
        }

        /* Checkbox Container */
        .checkbox-section {
            margin-bottom: 40px;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-left: 5px;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Submit Button */
        button[type="submit"] {
            width: 100%;
            max-width: 300px;
            background-color: #111111;
            color: #ffffff;
            padding: 16px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s ease, transform 0.3s ease;
            margin-top: 20px;
            animation: prestigiousReveal 2.2s cubic-bezier(0.075, 0.82, 0.165, 1) forwards;
            opacity: 0;
        }

        button[type="submit"]:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        /* PURE ULTRA-SLOW LOGO FADE ANIMATION */
        @keyframes logoPureFade {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        /* PRESTIGIOUS SLOW TEXT REVEAL KEYFRAMES (For Body Content) */
        @keyframes prestigiousReveal {
            0% {
                opacity: 0;
                transform: translateY(12px);
                filter: blur(2px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @media (max-width: 650px) {
            body {
                padding: 70px 20px 80px 20px;
            }
            .brand-header-logo .strong-title {
                font-size: 32px !important;
                letter-spacing: 6px !important;
            }
            .brand-header-logo .hero-logo-icon {
                width: 28px !important;
                height: 28px !important;
            }
            .brand-header-logo .script-subtitle {
                font-size: 26px !important;
                bottom: -20px !important;
            }
            .form-group-inline {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .form-group-inline input[type="text"],
            .form-group-inline input[type="email"],
            .form-group-inline textarea {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Minimal Back Arrow Button (Top Left) -->
    <a href="index.html" class="back-btn" aria-label="Back to home">
        <svg viewBox="0 0 24 24">
            <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
    </a>

    <!-- Application Form Container -->
    <div class="form-container">
        
        <!-- MOORE love and care Logo Header -->
        <div class="brand-header-logo">
            <span class="strong-title">MOORE</span>
            <img class="hero-logo-icon" src="heart.svg" alt="Heart Icon">
            <span class="script-subtitle">love and care</span>
        </div>

        <p class="subtext">Please fill out the application below to get started. Make sure all required fields are completed.</p>

        <!-- Form Endpoint -->
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            
            <div class="form-group-inline">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="Jane Doe" required>
            </div>

            <div class="form-group-inline">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="jane@example.com" required>
            </div>

            <div class="checkbox-section">
                <label>Select Your Preferences</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" name="preferences[]" value="Option 1">
                        Option 1 Description
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="preferences[]" value="Option 2">
                        Option 2 Description
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="preferences[]" value="Option 3">
                        Option 3 Description
                    </label>
                </div>
            </div>

            <div class="form-group-inline align-top">
                <label for="experience">Tell us about your experience</label>
                <textarea id="experience" name="experience" rows="2" placeholder="Write your response here..."></textarea>
            </div>

            <button type="submit">Submit Application</button>

        </form>
    </div>

    <!-- Share Button (Bottom Right) -->
    <button class="share-btn" onclick="sharePage()" aria-label="Share page">
        <svg viewBox="0 0 24 24">
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
        </svg>
        <span>Share</span>
    </button>

    <!-- Native Web Share Script -->
    <script>
        function sharePage() {
            if (navigator.share) {
                navigator.share({
                    title: 'Brownie Application',
                    url: window.location.href
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Application link copied to clipboard!');
            }
        }
    </script>

</body>
</html>
