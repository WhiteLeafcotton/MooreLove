<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brownie Application</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Pure white full-screen background */
        body {
            background-color: #ffffff;
            color: #333333;
            padding: 60px 40px;
            min-height: 100vh;
        }

        /* Main Form Container - Fills available width */
        .form-container {
            width: 100%;
            max-width: 1000px; /* Expands to fill screen space cleanly */
            margin: 0 auto;
        }

        /* Title & Subtext */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        p.subtext {
            color: #666666;
            font-size: 1rem;
            margin-bottom: 50px;
        }

        /* Side-by-Side Flex Layout for Text Fields */
        .form-group-inline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 35px;
            gap: 20px;
        }

        /* Question on the Left */
        .form-group-inline label {
            font-weight: 600;
            font-size: 1.05rem;
            color: #333333;
            min-width: 220px; /* Keeps question column structured */
            flex-shrink: 0;
        }

        /* Underline Input Fields on the Right */
        .form-group-inline input[type="text"],
        .form-group-inline input[type="email"],
        .form-group-inline textarea {
            flex-grow: 1;
            border: none;
            border-bottom: 2px solid #ccc;
            border-radius: 0;
            padding: 8px 4px;
            font-size: 1rem;
            background: transparent;
            outline: none;
            transition: border-color 0.2s;
        }

        /* Underline turns dark on click/focus */
        .form-group-inline input[type="text"]:focus,
        .form-group-inline input[type="email"]:focus,
        .form-group-inline textarea:focus {
            border-bottom-color: #111111;
        }

        /* Align text area smoothly for multi-line inputs */
        .form-group-inline.align-top {
            align-items: flex-start;
        }

        .form-group-inline.align-top label {
            padding-top: 8px;
        }

        .form-group-inline textarea {
            resize: vertical;
            min-height: 40px;
        }

        /* Checkbox Section */
        .checkbox-section {
            margin-bottom: 40px;
        }

        .checkbox-section > label {
            display: block;
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 15px;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-left: 5px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            cursor: pointer;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Submit Button */
        button[type="submit"] {
            width: 100%;
            max-width: 300px;
            background-color: #111111;
            color: #ffffff;
            padding: 16px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 20px;
        }

        button[type="submit"]:hover {
            opacity: 0.85;
        }

        /* Responsive adjustment for mobile screens */
        @media (max-width: 650px) {
            .form-group-inline {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .form-group-inline input[type="text"],
            .form-group-inline input[type="email"],
            .form-group-inline textarea {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>Brownie</h1>
        <p class="subtext">Please fill out the application below to get started. Make sure all required fields are completed.</p>

        <!-- REPLACE THE ACTION URL BELOW WITH YOUR FORMSPREE/WEB3FORMS ENDPOINT -->
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            
            <!-- Question on Left | Underline Input on Right -->
            <div class="form-group-inline">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="Jane Doe" required>
            </div>

            <div class="form-group-inline">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="jane@example.com" required>
            </div>

            <!-- Checkboxes -->
            <div class="checkbox-section">
                <label>Select Your Preferences</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" name="preferences[]" value="Option 1">
                        Option 1 Description
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="preferences[]" value="Option 2">
                        Option 2 Description
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="preferences[]" value="Option 3">
                        Option 3 Description
                    </label>
                </div>
            </div>

            <!-- Multi-line Underline Response -->
            <div class="form-group-inline align-top">
                <label for="experience">Tell us about your experience</label>
                <textarea id="experience" name="experience" rows="2" placeholder="Write your response here..."></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit">Submit Application</button>

        </form>
    </div>

</body>
</html>
