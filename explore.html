<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Open Graph Meta Tags for Social Sharing -->
    <meta property="og:title" content="Brownie | Application" />
    <meta property="og:description" content="Complete your Brownie application online. Quick and simple registration form." />
    <meta property="og:image" content="https://github.com/WhiteLeafcotton/MooreLove/blob/main/tag.jpg?raw=true" />
    <meta property="og:url" content="https://whiteleafcotton.github.io/MooreLove/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>Moore Love and Care | Resident Application</title>

    <!-- Google Fonts for Brand & Luxury Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=WindSong:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Pure white full-screen background */
        body {
            background-color: #ffffff;
            color: #333333;
            padding: 80px 40px;
            min-height: 100vh;
            position: relative;
        }

        /* Top Left Heart Back Button */
        .back-btn {
    position: absolute;
    top: 25px;
    left: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #333333;
    text-decoration: none;
    transition: transform 0.2s ease, opacity 0.2s ease;
}

.back-btn:hover {
    transform: translateX(-3px); /* Subtle slide left on hover */
    opacity: 0.7;
}

.back-btn svg {
    width: 24px;
    height: 24px;
}

        /* Bottom Left Share Button */
        /* Bottom Right Share Button */
.share-btn {
    position: fixed;
    bottom: 25px;
    right: 30px; /* Changed from left to right */
    background: none;
    border: none;
    cursor: pointer;
    color: #333333;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    transition: transform 0.2s ease, opacity 0.2s ease;
    z-index: 10;
}

        .share-btn:hover {
            transform: scale(1.05);
            opacity: 0.75;
        }

        .share-btn svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Main Form Container */
        .form-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* BRAND LOGO HEADER (MOORE love and care) */
        .brand-header-logo {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 35px;
        }

        .brand-header-logo .strong-title {
            font-family: 'Montserrat', sans-serif !important;
            font-weight: 300 !important;
            font-size: 48px !important;
            letter-spacing: 10px !important;
            text-transform: uppercase;
            color: #111111;
            line-height: 0.85;
            margin: 0;
        }

        .brand-header-logo .hero-logo-icon {
            width: 40px !important;
            height: 40px !important;
            opacity: 0.9;
            flex-shrink: 0;
        }

        .brand-header-logo .script-subtitle {
            font-family: 'WindSong', cursive !important;
            font-size: 36px !important;
            font-weight: 400;
            color: #111111 !important;
            position: absolute;
            bottom: -28px !important;
            left: 15% !important;
            z-index: 2;
            text-transform: lowercase;
            white-space: nowrap;
            pointer-events: none;
        }

        /* Title & Subtext */
        h1.form-title {
            font-size: 2.2rem;
            margin-bottom: 8px;
            font-weight: 700;
            margin-top: 20px;
        }

        p.subtext {
            color: #666666;
            font-size: 1rem;
            margin-bottom: 50px;
        }

        /* Side-by-Side Layout for Text Fields */
        .form-group-inline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 35px;
            gap: 20px;
        }

        .form-group-inline label {
            font-weight: 600;
            font-size: 1.05rem;
            color: #333333;
            min-width: 220px;
            flex-shrink: 0;
        }

        .form-group-inline input[type="text"],
        .form-group-inline input[type="email"],
        .form-group-inline textarea {
            flex-grow: 1;
            border: none;
            border-bottom: 2px solid #ccc;
            border-radius: 0;
            padding: 8px 4px;
            font-size: 1rem;
            background: transparent;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group-inline input[type="text"]:focus,
        .form-group-inline input[type="email"]:focus,
        .form-group-inline textarea:focus {
            border-bottom-color: #111111;
        }

        .form-group-inline.align-top {
            align-items: flex-start;
        }

        .form-group-inline.align-top label {
            padding-top: 8px;
        }

        .form-group-inline textarea {
            resize: vertical;
            min-height: 40px;
        }

        /* Checkbox Section */
        .checkbox-section {
            margin-bottom: 40px;
        }

        .checkbox-section > label {
            display: block;
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 15px;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-left: 5px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            cursor: pointer;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Submit Button */
        button[type="submit"] {
            width: 100%;
            max-width: 300px;
            background-color: #111111;
            color: #ffffff;
            padding: 16px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 20px;
        }

        button[type="submit"]:hover {
            opacity: 0.85;
        }

        @media (max-width: 650px) {
            body {
                padding: 70px 20px 80px 20px;
            }
            .brand-header-logo .strong-title {
                font-size: 32px !important;
                letter-spacing: 6px !important;
            }
            .brand-header-logo .hero-logo-icon {
                width: 28px !important;
                height: 28px !important;
            }
            .brand-header-logo .script-subtitle {
                font-size: 26px !important;
                bottom: -20px !important;
            }
            .form-group-inline {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .form-group-inline input[type="text"],
            .form-group-inline input[type="email"],
            .form-group-inline textarea {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Top Left Heart Back Button -->
    <!-- Minimal Back Arrow Button (Top Left) -->
<a href="index.html" class="back-btn" aria-label="Back to home">
    <svg viewBox="0 0 24 24">
        <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
</a>

    <!-- Application Form Container -->
    <div class="form-container">
        
        <!-- MOORE love and care Logo Header -->
        <div class="brand-header-logo">
            <span class="strong-title">MOORE</span>
            <img class="hero-logo-icon" src="heart.svg" alt="Heart Icon">
            <span class="script-subtitle">love and care</span>
        </div>

        
        <p class="subtext">Please fill out the application below to get started. Make sure all required fields are completed.</p>

        <!-- Form Endpoint -->
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            
            <div class="form-group-inline">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="Jane Doe" required>
            </div>

            <div class="form-group-inline">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="jane@example.com" required>
            </div>

            <div class="checkbox-section">
                <label>Select Your Preferences</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" name="preferences[]" value="Option 1">
                        Option 1 Description
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="preferences[]" value="Option 2">
                        Option 2 Description
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="preferences[]" value="Option 3">
                        Option 3 Description
                    </label>
                </div>
            </div>

            <div class="form-group-inline align-top">
                <label for="experience">Tell us about your experience</label>
                <textarea id="experience" name="experience" rows="2" placeholder="Write your response here..."></textarea>
            </div>

            <button type="submit">Submit Application</button>

        </form>
    </div>

    <!-- Share Button (Bottom Left) -->
    <button class="share-btn" onclick="sharePage()" aria-label="Share page">
        <svg viewBox="0 0 24 24">
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
        </svg>
        <span>Share</span>
    </button>

    <!-- Native Web Share Script -->
    <script>
        function sharePage() {
            if (navigator.share) {
                navigator.share({
                    title: 'Brownie Application',
                    url: window.location.href
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Application link copied to clipboard!');
            }
        }
    </script>

</body>
</html>
